name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        # Core + dev only. The NLI extra (transformers/torch) is intentionally
        # not installed: the NLI tests mock the model, so CI needs no download.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (flake8)
        run: flake8 syntony tests

      - name: Type check (mypy)
        run: mypy syntony

      - name: Test with coverage
        run: pytest --cov=syntony --cov-report=term-missing --cov-fail-under=85
